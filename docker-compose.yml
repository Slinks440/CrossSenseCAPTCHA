version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-"development_secret_change_me_in_production_123!"}
      - FLASK_DEBUG=0
    depends_on:
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    command: celery -A src.backend.celery_app worker --loglevel=info -c 4
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-"development_secret_change_me_in_production_123!"}
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis_data:
